services:
  db:
    image: pgvector/pgvector:pg17
    container_name: papertrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papertrail
      POSTGRES_USER: papertrail
      POSTGRES_PASSWORD: papertrail
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papertrail -d papertrail"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: papertrail-app/Dockerfile
    container_name: papertrail-app
    restart: unless-stopped
    env_file:
      - ./papertrail-app/.env.production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: papertrail-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
