services:
  db:
    image: pgvector/pgvector:pg17
    container_name: papertrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papertrail
      POSTGRES_USER: papertrail
      POSTGRES_PASSWORD: papertrail
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: papertrail-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
